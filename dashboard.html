<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Server Shop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-top-bar">
            <h2>Welcome, <span id="user-email"></span></h2>
            <button onclick="logout()" class="btn-secondary">Logout</button>
        </div>

        <h3 style="font-family: 'Playfair Display', serif; color: #1a252f; font-size: 28px; margin-bottom: 10px;">Available Servers</h3>
        <p style="color: #7f8c8d; margin-bottom: 40px;">Choose your perfect dedicated server configuration</p>
        
        <div class="servers-grid" id="servers-grid">
            <!-- Servers will be loaded here -->
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        // Check authentication
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('user-email').textContent = user.email;
                loadServers();
            }
        });

        // Sample servers data (matching the screenshot)
        const servers = [
            { 
                id: 1, 
                name: '2 x Xeon Platinum 8173M + VPN',
                processor: 'intel',
                processorVariant: '2 X XEON',
                score: 158145,
                cores: '56 Cores 2 CPU',
                memory: '128GB Memory',
                storage: '(12)HDD or (12)SSD or (2)NVMe',
                network: '40gbps Unmetered',
                features: ['IPMI Console', 'DDoS Protection'],
                prices: { '1month': 2487, '6months': 13999, '1year': 25999 } 
            },
            { 
                id: 2, 
                name: 'AMD RYZEN 9900X + VPN',
                processor: 'amd',
                processorVariant: '',
                score: 127510,
                cores: '12 Cores Single CPU',
                memory: '64GB Memory',
                storage: '(4)HDD or (4)SSD or (2)NVMe',
                network: '40gbps Unmetered',
                features: ['IPMI Console', 'DDoS Protection'],
                prices: { '1month': 2187, '6months': 11999, '1year': 22999 } 
            },
            { 
                id: 3, 
                name: '2 x Xeon Gold 6230R 8SFF + VPN',
                processor: 'intel',
                processorVariant: 'XEON GOLD',
                score: 186318,
                cores: '52 Cores 2 CPU',
                memory: '128GB Memory',
                storage: '(8)SSD or (2)NVMe',
                network: '40gbps Unmetered',
                features: ['IPMI Console', 'DDoS Protection'],
                prices: { '1month': 2287, '6months': 12199, '1year': 24499 } 
            }
        ];

        function loadServers() {
            const grid = document.getElementById('servers-grid');
            grid.innerHTML = servers.map(server => `
                <div class="server-card">
                    <h4>${server.name}</h4>
                    
                    <div class="processor-logo">
                        ${getProcessorLogo(server.processor, server.processorVariant)}
                    </div>
                    
                    <div class="performance-score">
                        <div class="score-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                                <path d="M12 6c-3.31 0-6 2.69-6 6 0 1.66.67 3.16 1.76 4.24l.01.01c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41C8.34 13.99 8 13.04 8 12c0-2.21 1.79-4 4-4 .92 0 1.76.31 2.44.84l5.3-5.3c.39-.39 1.02-.39 1.41 0 .39.39.39 1.02 0 1.41l-5.3 5.3C15.19 11.69 13.66 12 12 12z" opacity="0.3"/>
                                <path d="M12.5 7H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                            </svg>
                        </div>
                        <div class="score-number">${server.score.toLocaleString()}</div>
                    </div>
                    
                    <ul class="server-specs">
                        <li>
                            <span class="spec-label">Processor:</span>
                            <span class="spec-value">${server.cores}</span>
                        </li>
                        <li>
                            <span class="spec-label">Memory:</span>
                            <span class="spec-value">${server.memory}</span>
                        </li>
                        <li>
                            <span class="spec-label">Storage:</span>
                            <span class="spec-value">${server.storage}</span>
                        </li>
                        <li>
                            <span class="spec-label">Network:</span>
                            <span class="spec-value">${server.network}</span>
                        </li>
                        ${server.features.map(feature => `
                        <li>
                            <span class="spec-label">${feature}:</span>
                            <span class="spec-value">Included</span>
                        </li>
                        `).join('')}
                    </ul>
                    
                    <div class="server-price">
                        <div class="price-label">Cost:</div>
                        <div class="price-amount">
                            <span class="currency">$</span>
                            <span id="price-${server.id}">${server.prices['1month'].toLocaleString()}</span>
                            <span class="period">/mo</span>
                        </div>
                    </div>
                    
                    <div class="plan-selector">
                        <select id="plan-${server.id}" onchange="selectPlan(${server.id})">
                            <option value="">Select Plan Duration</option>
                            <option value="1month">1 Month - $${server.prices['1month'].toLocaleString()}</option>
                            <option value="6months">6 Months - $${server.prices['6months'].toLocaleString()}</option>
                            <option value="1year">1 Year - $${server.prices['1year'].toLocaleString()}</option>
                        </select>
                    </div>
                    
                    <button onclick="proceedToPayment(${server.id})" class="btn-configure">Configure Now!</button>
                </div>
            `).join('');
        }

        function getProcessorLogo(processor, variant) {
            if (processor === 'intel') {
                return `
                    <div class="intel-logo">
                        <div class="intel">intel</div>
                        <div class="xeon">XEON</div>
                        ${variant ? `<div class="variant">${variant}</div>` : ''}
                    </div>
                `;
            } else if (processor === 'amd') {
                return `
                    <div class="amd-logo">
                        <div class="amd">AMD</div>
                        <div class="ryzen">RYZEN</div>
                    </div>
                `;
            }
            return '';
        }

        function selectPlan(serverId) {
            const plan = document.getElementById(`plan-${serverId}`).value;
            const server = servers.find(s => s.id === serverId);
            
            if (plan && server) {
                const price = server.prices[plan];
                document.getElementById(`price-${serverId}`).textContent = price.toLocaleString();
                sessionStorage.setItem(`selected-plan-${serverId}`, plan);
            }
        }

        function proceedToPayment(serverId) {
            const plan = document.getElementById(`plan-${serverId}`).value;
            if (!plan) {
                alert('Please select a plan duration');
                return;
            }
            
            const server = servers.find(s => s.id === serverId);
            const price = server.prices[plan];
            
            sessionStorage.setItem('selected-server', JSON.stringify(server));
            sessionStorage.setItem('selected-plan', plan);
            sessionStorage.setItem('selected-price', price);
            
            window.location.href = 'payment.html';
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }
    </script>
</body>
</html>
